<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL - View Post</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="/FrontEnd/blog/blogHome.css">
    <style>
        .view-post-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .post-view-header {
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.95) 0%, rgba(15, 13, 10, 0.98) 100%);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .post-view-header h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .post-meta-full {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #3a3a3a;
        }

        .post-meta-full .category-badge {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .post-meta-full .date {
            font-size: 14px;
            color: #888888;
        }

        .post-view-body {
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.95) 0%, rgba(15, 13, 10, 0.98) 100%);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), 0 4px 15px rgba(0, 0, 0, 0.5);
            line-height: 1.8;
            font-size: 16px;
            color: #b0b0b0;
            word-wrap: break-word;
            white-space: pre-wrap;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .post-view-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            justify-content: flex-start;
        }

        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #d4af37;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #7c8ef5;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        /* Likes Section */
        .likes-section {
            margin-top: 30px;
            padding: 20px 0;
            border-top: 2px solid #2d2115;
            border-bottom: 2px solid #2d2115;
        }

        .like-btn {
            background: linear-gradient(135deg, #d4af37 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .like-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .like-btn.liked {
            background: #e74c3c;
        }

        /* Comments Section */
        .comments-section {
            margin-top: 40px;
        }

        .comments-section h3 {
            margin-bottom: 25px;
            font-size: 20px;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .add-comment {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .add-comment textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #2d2115;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.95) 0%, rgba(15, 13, 10, 0.98) 100%);
            color: #e8e8e8;
        }

        .add-comment textarea:focus {
            outline: none;
            border-color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .add-comment button {
            margin-top: 12px;
            padding: 12px 25px;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .comment-item {
            background: linear-gradient(135deg, rgba(26, 20, 16, 0.95) 0%, rgba(15, 13, 10, 0.98) 100%);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .comment-author {
            font-weight: 600;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .comment-email {
            font-size: 12px;
            color: #888888;
            margin-left: 8px;
        }

        .comment-date {
            font-size: 12px;
            color: #888888;
        }

        .comment-content {
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .comment-delete-btn {
            background: #3a3a3a;
            border: none;
            color: #ff6b6b;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .comment-delete-btn:hover {
            background: #e74c3c;
            color: white;
        }

        .no-comments {
            text-align: center;
            color: #888888;
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>📝 BlogHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../blog/blogHome.html" class="nav-link">Home</a></li>
                <li><span class="user-info" id="userInfo"></span></li>
                <li><button class="logout-btn" id="logoutBtn">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="view-post-container">
        <a href="../blog/blogHome.html" class="back-button">← Back to Blog</a>

        <div class="post-view-header">
            <h1 id="postTitle"></h1>
            <div class="post-meta-full">
                <span class="category-badge" id="postCategory"></span>
                <span class="date" id="postDate"></span>
            </div>
        </div>

        <div class="post-view-body" id="postContent"></div>

        <div class="post-view-actions">
            <button class="btn btn-primary" id="editBtn">Edit Post</button>
            <button class="btn btn-danger" id="deleteBtn">Delete Post</button>
        </div>

        <!-- Likes Section -->
        <div class="likes-section">
            <button class="like-btn" id="likeBtn">👍 <span id="likeCount">0</span> Likes</button>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
            <h3>Comments (<span id="commentCount">0</span>)</h3>
            
            <!-- Add Comment Form -->
            <div class="add-comment">
                <textarea id="commentInput" placeholder="Share your thoughts..." rows="3"></textarea>
                <button class="btn btn-primary" id="submitCommentBtn">Post Comment</button>
            </div>

            <!-- Comments List -->
            <div class="comments-list" id="commentsList">
                <p class="no-comments">No comments yet. Be the first to comment!</p>
            </div>
        </div>
    </div>

    <script src="/FrontEnd/viewPost/viewPost.js"></script>
</body>
</html>
